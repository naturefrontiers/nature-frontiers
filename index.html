<script>
    // Configuration
    // Try to detect the base path dynamically
    const pathParts = window.location.pathname.split('/').filter(p => p);
    // If URL is naturefrontiers.github.io/nature-frontiers/, base is usually root or /nature-frontiers/
    // We assume feed.xml is in the same directory as index.html
    const FEED_URL = 'feed.xml'; 
    const SOCIAL_URL = 'output/social_queue.md';
    
    const statusEl = document.getElementById('status');
    const lastRunEl = document.getElementById('last-run');
    const totalItemsEl = document.getElementById('total-items');
    const youtubeCountEl = document.getElementById('youtube-count');
    const articleCountEl = document.getElementById('article-count');
    const contentListEl = document.getElementById('content-list');
    const logListEl = document.getElementById('log-list');

    async function updateDashboard() {
        try {
            // Add timestamp to bypass browser cache
            const response = await fetch(FEED_URL + '?t=' + new Date().getTime());
            
            if (!response.ok) throw new Error('Feed not found');
            
            const text = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            
            const items = xmlDoc.querySelectorAll('item');
            const channelTitle = xmlDoc.querySelector('channel > title')?.textContent || 'Nature Frontiers';
            
            if (items.length === 0) {
                statusEl.innerHTML = '⚠️ No Content Yet';
                statusEl.className = 'status-badge warning';
                totalItemsEl.textContent = '0';
                return;
            }

            // Success State
            statusEl.innerHTML = '🟢 Live & Active';
            statusEl.className = 'status-badge success';
            lastRunEl.textContent = new Date().toLocaleString();
            
            let youtubeCount = 0;
            let articleCount = 0;
            let html = '';

            items.forEach((item, index) => {
                const title = item.querySelector('title')?.textContent || 'Untitled';
                const link = item.querySelector('link')?.textContent || '#';
                const desc = item.querySelector('description')?.textContent || '';
                const isYoutube = desc.toLowerCase().includes('youtube') || link.includes('youtube');
                
                if (isYoutube) youtubeCount++;
                else articleCount++;

                if (index < 10) { // Show top 10
                    const badgeClass = isYoutube ? 'badge-youtube' : 'badge-article';
                    const badgeText = isYoutube ? '📺 Video' : '📄 Article';
                    html += `
                        <div class="content-item">
                            <div class="content-header">
                                <span class="badge ${badgeClass}">${badgeText}</span>
                                <span class="content-date">${new Date(item.querySelector('pubDate')?.textContent).toLocaleDateString()}</span>
                            </div>
                            <h4>${title}</h4>
                            <a href="${link}" target="_blank" class="view-link">View Source →</a>
                        </div>
                    `;
                }
            });

            totalItemsEl.textContent = items.length;
            youtubeCountEl.textContent = youtubeCount;
            articleCountEl.textContent = articleCount;
            contentListEl.innerHTML = html;

            // Add to logs
            const logItem = document.createElement('div');
            logItem.className = 'log-item success';
            logItem.textContent = `${new Date().toLocaleTimeString()} - Synced ${items.length} items`;
            logListEl.prepend(logItem);

        } catch (error) {
            console.error(error);
            statusEl.innerHTML = '🔴 Offline / No Data';
            statusEl.className = 'status-badge error';
            lastRunEl.textContent = 'Check Actions tab';
            
            const logItem = document.createElement('div');
            logItem.className = 'log-item error';
            logItem.textContent = `${new Date().toLocaleTimeString()} - Failed to load feed.xml`;
            logListEl.prepend(logItem);
        }
    }

    // Initial load
    updateDashboard();
    // Refresh every 5 minutes
    setInterval(updateDashboard, 300000);
</script>

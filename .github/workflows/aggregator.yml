name: Nature Frontiers RSS Aggregator

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt; 
          else 
            echo "ERROR: requirements.txt not found!"; 
            exit 1; 
          fi

      - name: Check File Structure
        run: |
          echo "Checking files..."
          ls -R
          if [ ! -f src/sources.json ]; then echo "ERROR: src/sources.json missing"; exit 1; fi
          if [ ! -f scripts/aggregator.py ]; then echo "ERROR: scripts/aggregator.py missing"; exit 1; fi
          if [ ! -f data/state.json ]; then echo "ERROR: data/state.json missing"; exit 1; fi
          echo "All files found."

      - name: Run Aggregator Script
        id: run_script
        run: |
          python scripts/aggregator.py
          echo "Script finished."

      - name: Commit and Push Changes
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: Update feed and state [skip ci]"
            git push
          fi
